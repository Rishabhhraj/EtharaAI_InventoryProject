# Render Blueprint — API only (frontend on Vercel)
# Docs: https://render.com/docs/blueprint-spec
services:
  - type: web
    name: ethara-inventory-api
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: CORS_ORIGIN_REGEX
        value: https://.*\.vercel\.app
      - key: DEBUG
        value: "false"
      - key: PYTHON_VERSION
        value: "3.12.2"
