# Optional Blueprint for Render.com — adjust repo URLs and env vars before deploy
services:
  - type: web
    name: inventory-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: inventory-db
          property: connectionString
      - key: CORS_ORIGINS
        sync: false
    healthCheckPath: /health

  - type: web
    name: inventory-frontend
    runtime: docker
    dockerfilePath: ./frontend/Dockerfile
    dockerContext: ./frontend
    envVars:
      - key: VITE_API_URL
        sync: false

databases:
  - name: inventory-db
    plan: free
    databaseName: inventory_db
    user: inventory
